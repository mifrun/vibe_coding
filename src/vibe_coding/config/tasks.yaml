plan_task:
  description: >
    Задача пользователя: {user_task}

    Изучи проект на верхнем уровне. Сформулируй цель, ожидаемый результат,
    риски и короткий порядок работы.
  expected_output: Краткое описание цели, результата, рисков и порядка работы.
  agent: project_manager

analysis_task:
  description: >
    На основе задачи пользователя и предыдущего контекста сформулируй сценарии
    использования, критерии готовности и явно укажи, что не входит в задачу.
  expected_output: Сценарии, критерии готовности и ограничения.
  agent: lead_analyst

system_plan_task:
  description: >
    Переведи требования в технический план. Укажи файлы, которые вероятно нужно
    читать или менять, и проверки, которые надо выполнить.
  expected_output: Технический план с файлами и проверками.
  agent: system_analyst

tech_review_task:
  description: >
    Проверь технический план. Выбери самый простой надежный подход для текущего
    проекта и дай разработчику конкретные инструкции.
  expected_output: Короткое техническое решение и инструкции разработчику.
  agent: tech_lead

implementation_task:
  description: >
    Реализуй задачу пользователя: {user_task}

    Перед правками прочитай нужные файлы. Внеси изменения через tool write_file.
    Затем запусти релевантные проверки и посмотри git diff.
  expected_output: Список измененных файлов, выполненные проверки и результат реализации.
  agent: developer

qa_task:
  description: >
    Проверь результат реализации. Запусти доступные проверки, посмотри git diff и
    оцени, соответствует ли результат критериям готовности.
  expected_output: QA-отчет, найденные проблемы, остаточные риски и финальный статус.
  agent: qa

summary_task:
  description: >
    Собери финальный ответ пользователю: что сделано, какие файлы изменены,
    какие проверки прошли и что стоит сделать дальше.
  expected_output: Финальный короткий отчет для пользователя.
  agent: project_manager
